<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Login · Packs Grátis</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 20px;
    }

    .login-wrap {
      width: 100%;
      max-width: 380px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-logo .wordmark {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.6px;
      text-transform: uppercase;
    }

    .login-logo .wordmark span { color: var(--accent-l); }

    .login-logo p {
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 36px 28px;
      position: relative;
      z-index: 1;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .login-card h1 {
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 6px;
      letter-spacing: -0.4px;
      color: #fff;
    }

    .login-card .sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      padding: 14px 15px;
      outline: none;
      transition: all 0.2s;
    }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(196,30,46,0.12);
      background: rgba(255,255,255,0.06);
    }

    .login-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 900;
      padding: 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: all 0.22s;
      box-shadow: 0 4px 20px rgba(196,30,46,0.4);
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .login-btn:hover {
      background: var(--accent-l);
      box-shadow: 0 8px 28px rgba(196,30,46,0.55);
      transform: translateY(-2px);
    }

    .login-btn:disabled {
      opacity: 0.6;
      pointer-events: none;
    }

    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #F87171;
      font-size: 13px;
      font-weight: 700;
      padding: 12px 14px;
      border-radius: 7px;
      margin-bottom: 20px;
      display: none;
      text-align: center;
    }

    .error-msg.show { display: block; }

    .lock-icon {
      width: 48px; height: 48px;
      background: var(--accent-soft);
      border: 1px solid var(--accent-border);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
      font-size: 22px;
    }
  </style>
</head>
<body>

  <div class="login-wrap">

    <div class="login-logo">
      <div class="wordmark">packs<span>grátis</span></div>
      <p>Área Administrativa</p>
    </div>

    <div class="login-card fade-in">
      <div class="lock-icon">🔐</div>
      <h1>Acesso Restrito</h1>
      <p class="sub">Entre com suas credenciais para gerenciar o conteúdo do hub.</p>

      <div class="error-msg" id="error-msg"></div>

      <div class="form-group">
        <label>E-mail</label>
        <input id="email" type="email" placeholder="seu@email.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="login-btn" id="login-btn">
        <svg fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24" style="width:18px;height:18px;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
        </svg>
        Entrar no Painel
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js"></script>
  <script>
    const { createClient } = supabase;
    const _db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    (async () => {
      const { data: { session } } = await _db.auth.getSession();
      if (session) window.location.href = 'index.html';
    })();

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.add('show');
    }

    function hideError() {
      document.getElementById('error-msg').classList.remove('show');
    }

    async function doLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('login-btn');

      if (!email || !password) { showError('Preencha todos os campos.'); return; }

      hideError();
      btn.disabled = true;
      btn.textContent = 'Autenticando…';

      const { error } = await _db.auth.signInWithPassword({ email, password });

      if (error) {
        showError('Credenciais inválidas.');
        btn.disabled = false;
        btn.innerHTML = `<svg fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24" style="width:18px;height:18px;"><path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg> Entrar no Painel`;
        return;
      }

      window.location.href = 'index.html';
    }

    document.getElementById('login-btn').addEventListener('click', doLogin);

    ['email','password'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') doLogin();
      });
    });
  </script>
</body>
</html>
